<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trouver un artisan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
background: #070f1e;
font-family: Inter;
color: white;
margin: 0;
}

header {
padding: 40px;
text-align: center;
font-size: 32px;
font-weight: 700;
}

.search-box {
display:flex;
justify-content:center;
margin-top:20px;
}

input {
width: 400px;
padding:15px;
border-radius:12px;
border:none;
background:#0d1b34;
color:white;
font-size:18px;
}

button {
margin-left:10px;
padding:15px 25px;
background:#1f6bff;
border:none;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
}

.categories {
display:flex;
justify-content:center;
margin-top:30px;
gap:15px;
flex-wrap:wrap;
}

.cat {
background:#0d1b34;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

.results {
margin-top:40px;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card {

background:#0d1b34;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:.2s;

}

.card:hover {
transform:scale(1.02);
background:#11214a;
}

.panel {

position:fixed;
right:-400px;
top:0;
width:400px;
height:100%;
background:#09142a;
padding:30px;
transition:.4s;

}

.panel.active {

right:0;

}

.close {

cursor:pointer;
font-size:20px;

}

.contact-btn {

margin-top:20px;
background:#1f6bff;
padding:15px;
border-radius:10px;
text-align:center;

}

</style>
</head>

<body>

<header>

Trouver le bon artisan près de chez vous

<div class="search-box">

<input id="searchInput" placeholder="ex: plombier lyon">

<button onclick="search()">Rechercher</button>

</div>

</header>


<div class="categories">

<div class="cat" onclick="quick('plombier lyon')">Plombier</div>
<div class="cat" onclick="quick('coiffeur lyon')">Coiffeur</div>
<div class="cat" onclick="quick('électricien lyon')">Électricien</div>
<div class="cat" onclick="quick('serrurier lyon')">Serrurier</div>

</div>


<div class="results" id="results"></div>


<div class="panel" id="panel">

<div class="close" onclick="closePanel()">✖</div>

<h2 id="name"></h2>

<p id="city"></p>

<div class="contact-btn" id="phone"></div>

<div class="contact-btn" id="email"></div>

</div>


<script>

async function search(){

let query = document.getElementById("searchInput").value

let response = await fetch(
"http://localhost:8000/search?q="+query
)

let data = await response.json()

display(data)

}

function quick(text){

document.getElementById("searchInput").value=text
search()

}

function display(list){

let container=document.getElementById("results")

container.innerHTML=""

list.forEach(company=>{

container.innerHTML+=`

<div class="card" onclick="openPanel('${company.name}','${company.city}','${company.phone}','${company.email}')">

<h3>${company.name}</h3>

<p>${company.city}</p>

⭐ ${company.rating ?? "4.7"}

</div>

`

})

}

function openPanel(name,city,phone,email){

document.getElementById("panel").classList.add("active")

document.getElementById("name").innerText=name

document.getElementById("city").innerText=city

document.getElementById("phone").innerText="📞 "+phone

document.getElementById("email").innerText="✉ "+email

}

function closePanel(){

document.getElementById("panel").classList.remove("active")

}

</script>

</body>
</html>
